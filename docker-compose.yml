#===============================================================================
# docker-compose.yml — SIC Platform v1.3.0
#
# Usage:
#   docker compose build
#   docker compose run --rm sic SIC_Security.sh "recon example.com"
#
#   Visa-compliant scan:
#   docker compose run --rm -e VISA_MODE=1 -e H1_USERNAME=your_handle \
#     sic SIC_Security.sh "scan target.com"
#
#   Cloud security audit (mount AWS credentials):
#   docker compose run --rm \
#     -e CLOUD_PROVIDER=aws \
#     -v ~/.aws:/root/.aws:ro \
#     sic SIC_Cloud_Security.sh "audit AWS production"
#
#   Market analysis:
#   docker compose run --rm sic SIC_Stocks.sh "analyze AAPL"
#
#   Interactive shell:
#   docker compose run --rm sic
#===============================================================================
services:
  sic:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Override at build time to pre-pull different models:
        # docker compose build --build-arg MODELS="model1 model2"
        MODELS: "huihui_ai/Hermes-3-Llama-3.2-abliterated:3b stable-code:latest sec-coder:latest paramhshah19gpt/claudecode1:latest smollm:1.7b"
    image: sic-platform:latest
    container_name: sic-platform
    stdin_open: true
    tty: true
    volumes:
      - sic-models:/root/.ollama
      - ./wordlists:/usr/share/wordlists:ro
    environment:
      # Core
      - OLLAMA_HOST=http://localhost:11434
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-2}
      # Bug bounty compliance
      - VISA_MODE=${VISA_MODE:-0}
      - H1_USERNAME=${H1_USERNAME:-}
      # Execution mode
      - AUTO_RUN=${AUTO_RUN:-0}
      # Model overrides (pass through if set in .env)
      - ARCHITECT_MODEL=${ARCHITECT_MODEL:-}
      - CODER_MODEL=${CODER_MODEL:-}
      - ENHANCER_MODEL=${ENHANCER_MODEL:-}
      - THREAT_MODEL=${THREAT_MODEL:-}
      - REPORT_MODEL=${REPORT_MODEL:-}
      # SIC_Skip
      - RAPIDAPI_KEY=${RAPIDAPI_KEY:-}
      # SIC_Cloud_Security
      - CLOUD_PROVIDER=${CLOUD_PROVIDER:-}
      - AWS_PROFILE=${AWS_PROFILE:-}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-}
      - AZURE_TENANT=${AZURE_TENANT:-}
      - AZURE_CLIENT=${AZURE_CLIENT:-}
      - AZURE_SECRET=${AZURE_SECRET:-}
      # SIC_Stocks
      - PAPER_TRADE=${PAPER_TRADE:-0}
      - INTERVAL=${INTERVAL:-1d}
      - PERIOD=${PERIOD:-3mo}
    # Default drops to interactive shell if no command given
    command: []

volumes:
  sic-models:
